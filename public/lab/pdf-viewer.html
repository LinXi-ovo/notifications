<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF 预览</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%; width: 100%; overflow: hidden;
      font-family: -apple-system, 'PingFang SC', sans-serif;
      background: #e0e0e0;
    }
    body { display: flex; flex-direction: column; }

    #toolbar {
      display: flex; align-items: center; gap: 6px; padding: 4px 10px;
      background: #f5f5f5; border-bottom: 1px solid #ddd;
      font-size: 12px; flex-shrink: 0;
    }
    #toolbar button {
      padding: 2px 8px; background: #fff; border: 1px solid #ddd;
      border-radius: 3px; cursor: pointer; font-size: 12px; color: #444;
    }
    #toolbar button:hover { background: #e8e8e8; }
    #toolbar button:disabled { opacity: 0.3; cursor: default; }
    #toolbar .info { color: #999; font-size: 11px; }
    #toolbar input[type=number] {
      width: 36px; text-align: center; border: 1px solid #ddd;
      border-radius: 3px; padding: 2px; font-size: 12px;
    }

    #viewport {
      flex: 1; overflow: auto; display: flex; flex-direction: column;
      align-items: center; padding: 12px; gap: 8px; min-height: 0;
    }
    #viewport canvas {
      display: block; box-shadow: 0 1px 4px rgba(0,0,0,0.12);
      background: #fff; max-width: 100%;
    }
    .loading, .error {
      display: flex; align-items: center; justify-content: center;
      height: 100%; width: 100%; font-size: 14px;
    }
    .loading { color: #999; }
    .error { color: #e00; flex-direction: column; gap: 8px; }
    .error a { color: #3b82f6; text-decoration: underline; font-size: 13px; }
  </style>
</head>
<body>
  <div id="toolbar">
    <button id="prevBtn" disabled>←</button>
    <input type="number" id="pageInput" value="1" min="1" />
    <span id="pageInfo" class="info">/ —</span>
    <button id="nextBtn" disabled>→</button>
    <span class="info" style="margin-left:4px" id="zoomInfo">100%</span>
    <button id="zoomOut" style="margin-left:2px">−</button>
    <button id="zoomIn">+</button>
  </div>
  <div id="viewport">
    <div class="loading">⏳ 正在加载 PDF...</div>
  </div>

  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.worker.min.js'

    const params = new URLSearchParams(location.search)
    const pdfUrl = params.get('file')
    if (!pdfUrl) {
      document.getElementById('viewport').innerHTML = '<div class="error">缺少 ?file= 参数</div>'
      throw new Error('missing file param')
    }

    const $ = id => document.getElementById(id)
    const viewport = $('viewport')

    let pdfDoc = null
    let currentPage = 1
    let scale = 1.5

    $('openBtn') && ($('openBtn').href = pdfUrl)

    pdfjsLib.getDocument(pdfUrl).promise.then(pdf => {
      pdfDoc = pdf
      $('pageInfo').textContent = `/ ${pdf.numPages}`
      $('pageInput').max = pdf.numPages
      $('pageInput').disabled = false
      renderPage(1)
    }).catch(e => {
      viewport.innerHTML = `<div class="error">❌ 加载失败<div style="font-size:12px;color:#999;margin-top:4px">${e.message}</div><a href="${pdfUrl}" target="_blank">在新标签页中打开</a></div>`
    })

    async function renderPage(num) {
      if (!pdfDoc) return
      try {
        const page = await pdfDoc.getPage(num)
        const vp = page.getViewport({ scale })
        const old = viewport.querySelector('canvas')
        if (old) old.remove()

        const canvas = document.createElement('canvas')
        viewport.prepend(canvas)
        canvas.width = vp.width
        canvas.height = vp.height

        await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise
        currentPage = num
        $('pageInput').value = num
        $('prevBtn').disabled = num <= 1
        $('nextBtn').disabled = num >= pdfDoc.numPages
      } catch (e) {
        console.error('渲染失败:', e)
      }
    }

    $('prevBtn').onclick = () => currentPage > 1 && renderPage(currentPage - 1)
    $('nextBtn').onclick = () => currentPage < pdfDoc.numPages && renderPage(currentPage + 1)
    $('pageInput').onchange = () => { const p = parseInt($('pageInput').value); if (p >= 1 && p <= pdfDoc.numPages) renderPage(p) }
    $('zoomIn').onclick = () => { scale = Math.min(scale + 0.25, 4); $('zoomInfo').textContent = Math.round(scale / 1.5 * 100) + '%'; if (pdfDoc) renderPage(currentPage) }
    $('zoomOut').onclick = () => { scale = Math.max(scale - 0.25, 0.5); $('zoomInfo').textContent = Math.round(scale / 1.5 * 100) + '%'; if (pdfDoc) renderPage(currentPage) }
  </script>
</body>
</html>
